name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Winche.Storage.slnx

      - name: Build
        run: dotnet build Winche.Storage.slnx -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/Winche.Storage/Winche.Storage.csproj -c Release --no-build -o ./packages
          dotnet pack src/Winche.Storage.AspNetCore.Rest/Winche.Storage.AspNetCore.Rest.csproj -c Release --no-build -o ./packages
          dotnet pack src/Winche.Storage.S3/Winche.Storage.S3.csproj -c Release --no-build -o ./packages

      - name: Push
        run: dotnet nuget push ./packages/*.nupkg ./packages/*.snupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
